<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Intel | Revenue Insights</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; background: #f1f5f9; color: #0f172a; }

        /* ========== PROFESSIONAL HEADER ========== */
        .market-header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 28px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .market-logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        .market-title h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #1e2b3c, #2c4e6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .market-title p {
            font-size: 11px;
            color: #64748b;
            margin-top: 2px;
        }
        .powered-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8fafc;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #e2edf2;
        }
        .powered-badge span {
            font-size: 12px;
            font-weight: 600;
            color: #1f4e6e;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 12px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        /* ========== WEEK SELECTOR BAR ========== */
        .week-bar {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .week-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        .week-controls label {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
        }
        .week-picker {
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            background: white;
        }
        .week-select {
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            background: white;
            min-width: 180px;
        }
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 7px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .refresh-btn:hover { background: #2563eb; }

        /* ========== KPI CARDS ========== */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 24px 28px;
        }
        @media (max-width: 900px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .kpi-card {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            transition: all 0.2s;
        }
        .kpi-card:hover {
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-color: #cbd5e1;
        }
        .kpi-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .kpi-value {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.2;
            margin-bottom: 6px;
        }
        .kpi-change {
            font-size: 12px;
            font-weight: 500;
        }
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        .trend-neutral { color: #64748b; }

        /* ========== SCROLLABLE CONTAINERS ========== */
        .scroll-container {
            margin: 20px 28px;
            position: relative;
        }
        .scroll-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .scroll-header h3 {
            font-size: 14px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .scroll-arrows {
            display: flex;
            gap: 8px;
        }
        .scroll-arrow {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: white;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }
        .scroll-arrow:hover {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        /* Property scroll */
        .property-scroll {
            overflow-x: auto;
            scroll-behavior: smooth;
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 4px;
        }
        .property-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .property-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        .property-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .properties-container {
            display: inline-flex;
            gap: 1px;
            background: #e2e8f0;
        }
        .property-card {
            width: 280px;
            flex-shrink: 0;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }
        .property-name {
            padding: 14px 12px;
            background: #f8fafc;
            font-weight: 700;
            font-size: 13px;
            border-bottom: 2px solid #e2e8f0;
            white-space: normal;
            word-break: break-word;
        }

        /* Date scroll */
        .date-scroll {
            overflow-x: auto;
            scroll-behavior: smooth;
        }
        .date-scroll::-webkit-scrollbar {
            height: 6px;
        }
        .dates-container {
            display: inline-flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .date-cell {
            width: 130px;
            flex-shrink: 0;
            padding: 12px 8px;
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            border-right: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        /* Rate cells */
        .day-rate-cell {
            width: 130px;
            flex-shrink: 0;
            padding: 12px 8px;
            text-align: center;
            border-right: 1px solid #e2e8f0;
            font-size: 12px;
        }
        .current-rate {
            font-weight: 700;
            color: #0f172a;
        }
        .prev-rate {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }
        .change-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 4px;
        }
        .change-up {
            background: #dcfce7;
            color: #15803d;
        }
        .change-down {
            background: #fee2e2;
            color: #dc2626;
        }
        .sold-out-badge {
            background: #fef2f2;
            color: #dc2626;
            font-weight: 600;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 12px;
            display: inline-block;
        }
        .no-data {
            color: #94a3b8;
            font-size: 11px;
        }

        /* Graph section */
        .graph-section {
            margin: 28px;
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            padding: 20px;
        }
        .graph-section h3 {
            font-size: 14px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        canvas {
            max-height: 300px;
            width: 100%;
        }

        .loading, .error, .empty-state {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            margin: 40px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- HEADER: Market Intel + Powered by Revenue Insights -->
<div class="market-header">
    <div class="logo-area">
        <div class="market-logo">MI</div>
        <div class="market-title">
            <h1>Market Intel</h1>
            <p>Daily Rate Intelligence · Waterfall & Ellipse</p>
        </div>
    </div>
    <div class="powered-badge">
        <span>⚡</span>
        <span>Powered by Revenue Insights</span>
        <span class="live-dot"></span>
    </div>
</div>

<!-- Week Selector -->
<div class="week-bar">
    <div class="week-controls">
        <label>📅 Compare Week:</label>
        <input type="date" id="weekPicker" class="week-picker">
        <button class="refresh-btn" onclick="loadComparison()">Load</button>
    </div>
    <div class="week-controls">
        <label>Or saved weeks:</label>
        <select id="weekSelect" class="week-select">
            <option value="">— Select week —</option>
        </select>
    </div>
    <div style="font-size: 12px; color: #64748b; margin-left: auto;">
        <span>🖱️ Scroll horizontally → see all properties & dates</span>
    </div>
</div>

<!-- KPI Section - DYNAMIC, updates with week selection -->
<div id="kpiSection" class="kpi-grid" style="display: none;"></div>

<!-- Content Area -->
<div id="content" class="loading">Loading market intelligence...</div>

<script>
    const API_BASE = 'https://backend-x5sw.onrender.com';
    let currentData = null;
    let chart = null;

    async function loadAvailableWeeks() {
        try {
            const res = await fetch(`${API_BASE}/api/rate-shop/available-weeks`);
            const weeks = await res.json();
            const select = document.getElementById('weekSelect');
            select.innerHTML = '<option value="">— Select week —</option>';
            weeks.forEach(week => {
                const cleanWeek = String(week).split(':')[0].split('%')[0];
                const option = document.createElement('option');
                option.value = cleanWeek;
                const date = new Date(cleanWeek + 'T00:00:00');
                option.textContent = date.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
                select.appendChild(option);
            });
        } catch (err) {
            console.error('Failed to load weeks:', err);
        }
    }

    document.getElementById('weekSelect').addEventListener('change', function(e) {
        if (e.target.value) {
            document.getElementById('weekPicker').value = e.target.value;
            loadComparison();
        }
    });

    async function loadComparison() {
        let weekStart = document.getElementById('weekPicker').value;
        if (!weekStart) {
            const today = new Date();
            const day = today.getDay();
            const diff = day === 0 ? 6 : day - 1;
            const monday = new Date(today);
            monday.setDate(today.getDate() - diff);
            weekStart = monday.toISOString().split('T')[0];
            document.getElementById('weekPicker').value = weekStart;
        }
        
        const container = document.getElementById('content');
        container.innerHTML = '<div class="loading">⏳ Loading daily comparison...</div>';
        
        try {
            const res = await fetch(`${API_BASE}/api/rate-shop/daily-comparison?week_start_date=${weekStart}`);
            const data = await res.json();
            currentData = data;
            
            // Calculate and render KPIs first
            renderKPIs(data);
            // Then render the scrollable dashboard
            renderDashboard(data);
        } catch (err) {
            container.innerHTML = `<div class="error">❌ Failed to load: ${err.message}</div>`;
            document.getElementById('kpiSection').style.display = 'none';
        }
    }

    function renderKPIs(data) {
        const days = data.days;
        const properties = data.properties;
        
        if (!properties || properties.length === 0) {
            document.getElementById('kpiSection').style.display = 'none';
            return;
        }
        
        // Calculate KPIs
        let totalCurrentRates = 0;
        let rateCount = 0;
        let totalPrevRates = 0;
        let prevCount = 0;
        let soldOutCount = 0;
        let priceUpCount = 0;
        let priceDownCount = 0;
        let biggestChange = 0;
        let biggestMoverName = '';
        let biggestChangeAbs = 0;
        
        // For median calculation
        let allRates = [];
        
        for (const prop of properties) {
            for (const day of days) {
                const current = prop[`${day}_current`];
                const previous = prop[`${day}_previous`];
                const soldOut = prop[`${day}_sold_out`];
                const change = prop[`${day}_change`];
                
                if (current && !soldOut) {
                    totalCurrentRates += current;
                    rateCount++;
                    allRates.push(current);
                }
                if (previous) {
                    totalPrevRates += previous;
                    prevCount++;
                }
                if (soldOut) soldOutCount++;
                if (change && change !== 0) {
                    if (change > 0) priceUpCount++;
                    if (change < 0) priceDownCount++;
                    
                    const absChange = Math.abs(change);
                    if (absChange > biggestChangeAbs) {
                        biggestChangeAbs = absChange;
                        biggestChange = change;
                        biggestMoverName = prop.property;
                    }
                }
            }
        }
        
        const avgRate = rateCount > 0 ? totalCurrentRates / rateCount : 0;
        const prevAvgRate = prevCount > 0 ? totalPrevRates / prevCount : 0;
        const avgChangePct = prevAvgRate > 0 ? ((avgRate - prevAvgRate) / prevAvgRate * 100) : 0;
        
        // Calculate median
        allRates.sort((a, b) => a - b);
        const medianRate = allRates.length > 0 ? allRates[Math.floor(allRates.length / 2)] : 0;
        
        const highDemandCount = properties.filter(prop => {
            let hasHighDemand = false;
            for (const day of days) {
                const soldOut = prop[`${day}_sold_out`];
                if (soldOut) hasHighDemand = true;
            }
            return hasHighDemand;
        }).length;
        
        const weekDate = new Date(data.week_start_date + 'T00:00:00');
        const prevWeekDate = data.prev_week_start_date ? new Date(data.prev_week_start_date + 'T00:00:00') : null;
        
        const kpiHtml = `
            <div class="kpi-card">
                <div class="kpi-label">AVG MARKET RATE</div>
                <div class="kpi-value">R ${Math.round(avgRate).toLocaleString()}</div>
                <div class="kpi-change ${avgChangePct > 0 ? 'trend-up' : (avgChangePct < 0 ? 'trend-down' : 'trend-neutral')}">
                    ${avgChangePct > 0 ? '+' : ''}${avgChangePct.toFixed(1)}% vs last week
                </div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">MEDIAN RATE</div>
                <div class="kpi-value">R ${Math.round(medianRate).toLocaleString()}</div>
                <div class="kpi-change trend-neutral">Mid-market benchmark</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">HIGH DEMAND</div>
                <div class="kpi-value">${highDemandCount} / ${properties.length}</div>
                <div class="kpi-change trend-neutral">Properties with sold-out days</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">BIGGEST MOVER</div>
                <div class="kpi-value">${biggestChange > 0 ? '+' : ''}R ${Math.round(biggestChangeAbs).toLocaleString()}</div>
                <div class="kpi-change ${biggestChange > 0 ? 'trend-up' : 'trend-down'}">
                    ${escapeHtml(biggestMoverName.substring(0, 35))}${biggestMoverName.length > 35 ? '...' : ''}
                </div>
            </div>
        `;
        
        const kpiSection = document.getElementById('kpiSection');
        kpiSection.innerHTML = kpiHtml;
        kpiSection.style.display = 'grid';
    }

    function renderDashboard(data) {
        const days = data.days;
        const properties = data.properties;
        
        if (!properties || properties.length === 0) {
            document.getElementById('content').innerHTML = '<div class="empty-state">📭 No data found for this week. Upload daily rates first.</div>';
            return;
        }

        let html = `
            <!-- Property Horizontal Scroll -->
            <div class="scroll-container">
                <div class="scroll-header">
                    <h3><span>🏨</span> PROPERTIES — HORIZONTAL SCROLL (${properties.length} total)</h3>
                    <div class="scroll-arrows">
                        <div class="scroll-arrow" onclick="scrollProperties('left')">←</div>
                        <div class="scroll-arrow" onclick="scrollProperties('right')">→</div>
                    </div>
                </div>
                <div class="property-scroll" id="propertyScroll">
                    <div class="properties-container" id="propertiesContainer">
        `;
        
        for (let idx = 0; idx < properties.length; idx++) {
            const prop = properties[idx];
            html += `
                <div class="property-card" data-prop-index="${idx}">
                    <div class="property-name">${escapeHtml(prop.property)}</div>
            `;
            
            for (let d = 0; d < days.length; d++) {
                const day = days[d];
                const current = prop[`${day}_current`];
                const previous = prop[`${day}_previous`];
                const change = prop[`${day}_change`];
                const changePct = prop[`${day}_change_pct`];
                const soldOut = prop[`${day}_sold_out`];
                
                html += `<div class="day-rate-cell">`;
                if (soldOut) {
                    html += `<div><span class="sold-out-badge">Sold out</span></div>`;
                } else if (current) {
                    html += `<div class="current-rate">R ${Math.round(current).toLocaleString()}</div>`;
                    if (previous) {
                        html += `<div class="prev-rate">Last week: R ${Math.round(previous).toLocaleString()}</div>`;
                        if (change && change !== 0) {
                            const changeClass = change > 0 ? 'change-up' : 'change-down';
                            const sign = change > 0 ? '+' : '';
                            html += `<div><span class="change-badge ${changeClass}">${sign}${Math.round(Math.abs(change))} (${sign}${Math.abs(Math.round(changePct))}%)</span></div>`;
                        }
                    }
                } else {
                    html += `<div class="no-data">— No data —</div>`;
                }
                html += `</div>`;
            }
            html += `</div>`;
        }
        
        html += `
                    </div>
                </div>
            </div>
            
            <!-- Date Horizontal Scroll Header -->
            <div class="scroll-container">
                <div class="scroll-header">
                    <h3><span>📅</span> DATES — HORIZONTAL SCROLL</h3>
                    <div class="scroll-arrows">
                        <div class="scroll-arrow" onclick="scrollDates('left')">←</div>
                        <div class="scroll-arrow" onclick="scrollDates('right')">→</div>
                    </div>
                </div>
                <div class="date-scroll" id="dateScroll">
                    <div class="dates-container" id="datesContainer">
        `;
        
        for (let d = 0; d < days.length; d++) {
            const day = days[d];
            html += `
                <div class="date-cell">
                    <div><strong>${day}</strong></div>
                    <div style="font-size: 10px; margin-top: 4px;">This Week vs Last Week</div>
                </div>
            `;
        }
        
        html += `
                    </div>
                </div>
            </div>
            
            <!-- Graph Section -->
            <div class="graph-section">
                <h3>📈 RATE MOVEMENT — AVERAGE PRICE TREND (This Week vs Last Week)</h3>
                <canvas id="rateMovementChart"></canvas>
            </div>
        `;
        
        document.getElementById('content').innerHTML = html;
        
        // Render graph
        renderChart(data);
        
        // Sync scrolling
        const propertyScroll = document.getElementById('propertyScroll');
        const dateScroll = document.getElementById('dateScroll');
        
        if (propertyScroll && dateScroll) {
            propertyScroll.addEventListener('scroll', () => {
                dateScroll.scrollLeft = propertyScroll.scrollLeft;
            });
            dateScroll.addEventListener('scroll', () => {
                propertyScroll.scrollLeft = dateScroll.scrollLeft;
            });
        }
    }

    function renderChart(data) {
        const days = data.days;
        const properties = data.properties;
        
        const avgCurrent = [];
        const avgPrevious = [];
        
        for (let d = 0; d < days.length; d++) {
            const day = days[d];
            let sumCurrent = 0;
            let sumPrev = 0;
            let countCurrent = 0;
            let countPrev = 0;
            
            for (const prop of properties) {
                const current = prop[`${day}_current`];
                const previous = prop[`${day}_previous`];
                if (current && !prop[`${day}_sold_out`]) {
                    sumCurrent += current;
                    countCurrent++;
                }
                if (previous) {
                    sumPrev += previous;
                    countPrev++;
                }
            }
            
            avgCurrent.push(countCurrent > 0 ? sumCurrent / countCurrent : 0);
            avgPrevious.push(countPrev > 0 ? sumPrev / countPrev : 0);
        }
        
        const ctx = document.getElementById('rateMovementChart').getContext('2d');
        
        if (chart) {
            chart.destroy();
        }
        
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: days,
                datasets: [
                    {
                        label: 'This Week Avg Rate',
                        data: avgCurrent,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.3,
                        fill: true,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    },
                    {
                        label: 'Last Week Avg Rate',
                        data: avgPrevious,
                        borderColor: '#94a3b8',
                        backgroundColor: 'rgba(148, 163, 184, 0.1)',
                        tension: 0.3,
                        fill: true,
                        borderDash: [5, 5],
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return `${context.dataset.label}: R ${Math.round(context.raw).toLocaleString()}`;
                            }
                        }
                    },
                    legend: {
                        position: 'top',
                    }
                },
                scales: {
                    y: {
                        beginAtZero: false,
                        title: {
                            display: true,
                            text: 'Rate (ZAR)',
                            font: { weight: 'bold' }
                        },
                        ticks: {
                            callback: function(value) {
                                return 'R ' + value.toLocaleString();
                            }
                        }
                    }
                }
            }
        });
    }

    function scrollProperties(direction) {
        const container = document.getElementById('propertyScroll');
        if (container) {
            const scrollAmount = 300;
            if (direction === 'left') {
                container.scrollLeft -= scrollAmount;
            } else {
                container.scrollLeft += scrollAmount;
            }
        }
    }
    
    function scrollDates(direction) {
        const container = document.getElementById('dateScroll');
        if (container) {
            const scrollAmount = 300;
            if (direction === 'left') {
                container.scrollLeft -= scrollAmount;
            } else {
                container.scrollLeft += scrollAmount;
            }
        }
    }

    function escapeHtml(str) {
        return String(str || '').replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // Initialize
    loadAvailableWeeks();
    loadComparison();
</script>
