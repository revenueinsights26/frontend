<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Rate Intelligence - Waterfall B&B</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background:#f8fafc; color:#1e293b; }

        .topbar { background:white; border-bottom:1px solid #e2e8f0; padding:0 28px; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 3px rgba(0,0,0,.06); }
        .logo { width:32px; height:32px; background:#3b82f6; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:white; }

        .week-bar { background:white; border-bottom:1px solid #e2e8f0; padding:12px 28px; display:flex; align-items:center; gap:12px; overflow-x:auto; }
        .week-btn { padding:6px 16px; border-radius:20px; font-size:13px; border:1px solid #e2e8f0; background:white; cursor:pointer; white-space:nowrap; }
        .week-btn.active { background:#3b82f6; color:white; border-color:#3b82f6; }

        .main { max-width:1300px; margin:0 auto; padding:24px 20px; }

        .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
        .kpi { background:white; border:1px solid #e2e8f0; border-radius:14px; padding:18px 20px; }
        .kpi-label { font-size:11px; font-weight:700; text-transform:uppercase; color:#64748b; }
        .kpi-value { font-size:28px; font-weight:800; color:#0f172a; }

        .section-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#64748b; margin:28px 0 12px; }

        .table-wrapper { background:white; border:1px solid #e2e8f0; border-radius:14px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th, td { padding:12px 10px; text-align:center; border-bottom:1px solid #f1f5f9; }
        th { background:#f8fafc; font-weight:600; color:#475569; }
        td:first-child { text-align:left; font-weight:600; position:sticky; left:0; background:#f8fafc; z-index:1; min-width:200px; }

        .rate-up { color:#15803d; font-weight:600; }
        .rate-down { color:#dc2626; font-weight:600; }
        .sold-out { background:#fef2f2; color:#dc2626; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:700; }
        .no-data { color:#94a3b8; }

        .insights-card { background:white; border:1px solid #e2e8f0; border-radius:14px; padding:20px; }
    </style>
</head>
<body>

<div class="topbar">
    <div style="display:flex; align-items:center; gap:12px;">
        <div class="logo">RI</div>
        <div>
            <strong>Waterfall B&B — Daily Rate Intelligence</strong><br>
            <span style="font-size:12px;color:#64748b;">Day-by-Day Competitor Analysis</span>
        </div>
    </div>
</div>

<div class="week-bar" id="week-bar">
    <!-- Week buttons will be injected here -->
</div>

<div class="main">
    <div id="content">Loading...</div>
</div>

<script>
    const API_BASE = 'https://backend-x5sw.onrender.com';
    let currentData = null;
    let days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

    async function loadDailyComparison(weekStart) {
        const content = document.getElementById('content');
        content.innerHTML = `<div style="text-align:center;padding:80px;color:#64748b;">⏳ Loading daily comparison for ${weekStart}...</div>`;

        try {
            const res = await fetch(`${API_BASE}/api/rate-shop/daily-comparison?week_start_date=${weekStart}`);
            if (!res.ok) {
                throw new Error(`Server error: ${res.status}`);
            }
            const data = await res.json();
            currentData = data;
            renderDailyDashboard(data);
        } catch (err) {
            console.error(err);
            content.innerHTML = `
                <div style="background:#fef2f2; color:#dc2626; padding:30px; border-radius:12px; text-align:center; border:1px solid #fecaca;">
                    <h3>⚠️ Backend Error (500)</h3>
                    <p>The daily comparison endpoint is currently failing on the server.</p>
                    <small>${err.message}</small><br><br>
                    <button onclick="window.location.reload()" style="padding:10px 20px;">Retry</button>
                </div>`;
        }
    }

    function renderDailyDashboard(data) {
        if (!data.properties || data.properties.length === 0) {
            document.getElementById('content').innerHTML = "<p>No data found.</p>";
            return;
        }

        let html = `
            <div class="kpi-grid">
                <div class="kpi"><div class="kpi-label">Properties</div><div class="kpi-value">${data.properties.length}</div></div>
                <div class="kpi"><div class="kpi-label">Week</div><div class="kpi-value">${data.week_start_date}</div></div>
            </div>

            <div class="section-title">📅 Daily Week-over-Week Comparison</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Property</th>`;
        
        days.forEach(day => html += `<th colspan="3">${day}</th>`);
        html += `</tr><tr>`;
        days.forEach(() => html += `<th>This Week</th><th>Last Week</th><th>Change</th>`);
        html += `</tr></thead><tbody>`;

        data.properties.forEach(prop => {
            html += `<tr><td>${escapeHtml(prop.property)}</td>`;
            days.forEach(day => {
                const curr = prop[`${day}_current`];
                const prev = prop[`${day}_previous`];
                const chg = prop[`${day}_change`];
                const pct = prop[`${day}_change_pct`];
                const sold = prop[`${day}_sold_out`];

                const currHTML = sold ? `<span class="sold-out">SOLD OUT</span>` : (curr ? `R ${Math.round(curr)}` : '—');
                let chgHTML = '—';
                if (chg != null) {
                    const cls = chg > 0 ? 'rate-up' : 'rate-down';
                    chgHTML = `<span class="${cls}">${chg>0?' +':''}R${Math.abs(Math.round(chg))}<br><small>(${chg>0?' +':''}${Math.round(pct)}%)</small></span>`;
                }
                html += `<td>${currHTML}</td><td>${prev ? 'R '+Math.round(prev) : '—'}</td><td>${chgHTML}</td>`;
            });
            html += `</tr>`;
        });

        html += `</tbody></table></div>`;

        html += `<div class="section-title">🔍 Daily Insights</div>
                 <div class="insights-card" id="insights"></div>`;

        document.getElementById('content').innerHTML = html;
        generateCommentary(data);
    }

    function generateCommentary(data) {
        // Simple logic-based commentary
        const insights = document.getElementById('insights');
        insights.innerHTML = `<p>Daily comparison loaded for <strong>${data.week_start_date}</strong>.</p>
                              <p>Compare rates day-by-day across the week. More weeks of data will enable better pattern detection.</p>`;
    }

    function escapeHtml(str) {
        return String(str || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    // Initial load
    window.onload = () => {
        const defaultWeek = "2026-04-27"; // Change as needed
        loadDailyComparison(defaultWeek);
    };
</script>
</body>
</html>
