<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daily Rate Shop — Day-by-Day Competitor Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f1f5f9; color: #0f172a; padding: 24px; }
        .container { max-width: 1600px; margin: 0 auto; }
        
        /* Header */
        .header { margin-bottom: 24px; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header .sub { color: #64748b; font-size: 14px; }
        
        /* Week Bar */
        .week-bar { background: white; border-radius: 16px; padding: 16px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; border: 1px solid #e2e8f0; }
        .week-bar label { font-weight: 600; font-size: 14px; color: #1e293b; }
        .week-picker { padding: 8px 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; background: white; min-width: 220px; }
        .week-select { padding: 8px 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; background: white; min-width: 200px; }
        .refresh-btn { background: #3b82f6; color: white; border: none; padding: 8px 20px; border-radius: 10px; font-weight: 500; cursor: pointer; }
        .refresh-btn:hover { background: #2563eb; }
        
        /* KPI Grid */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
        @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
        .kpi-card { background: white; border-radius: 20px; padding: 20px 24px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.03); transition: all 0.2s; }
        .kpi-card:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.05); border-color: #cbd5e1; }
        .kpi-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 8px; }
        .kpi-value { font-size: 28px; font-weight: 800; color: #0f172a; line-height: 1.2; margin-bottom: 6px; }
        .kpi-change { font-size: 12px; font-weight: 500; color: #64748b; }
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        
        /* Insights Card */
        .insights-card { background: white; border-radius: 20px; padding: 20px 24px; margin-bottom: 24px; border: 1px solid #e2e8f0; }
        .insights-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin-bottom: 12px; }
        .insight-item { display: flex; align-items: flex-start; gap: 12px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #1e293b; }
        .insight-item:last-child { border-bottom: none; }
        .insight-dot { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
        
        /* Table Styles */
        .section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; margin: 24px 0 16px 0; }
        .table-wrapper { overflow-x: auto; background: white; border-radius: 16px; border: 1px solid #e2e8f0; }
        .daily-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1200px; }
        .daily-table th, .daily-table td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; vertical-align: middle; }
        .daily-table th:first-child, .daily-table td:first-child { position: sticky; left: 0; background: white; font-weight: 600; text-align: left; z-index: 1; min-width: 200px; }
        .daily-table th { background: #f8fafc; font-weight: 600; color: #475569; }
        .day-group { background: #f1f5f9; border-bottom: 2px solid #e2e8f0; }
        .rate-up { color: #10b981; font-weight: 600; }
        .rate-down { color: #ef4444; font-weight: 600; }
        .sold-out { background: #fef2f2; color: #dc2626; font-weight: 600; display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; }
        .no-data { color: #94a3b8; }
        
        .loading, .error { text-align: center; padding: 60px; background: white; border-radius: 16px; }
        .sub-note { margin-top: 16px; font-size: 12px; color: #64748b; text-align: right; }
        
        .heat-pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .heat-hot { background: #fef3c7; color: #d97706; }
        .heat-stable { background: #f1f5f9; color: #475569; }
        .heat-cool { background: #e0f2fe; color: #0369a1; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📅 Daily Rate Shop — Day-by-Day Competitor Comparison</h1>
        <div class="sub">Tracks daily rates for each property. Compare Monday vs Monday, Tuesday vs Tuesday, etc.</div>
    </div>
    
    <div class="week-bar">
        <label>📅 Select Week (Monday):</label>
        <input type="date" id="weekPicker" class="week-picker">
        <label style="margin-left: auto;">Or select from saved weeks:</label>
        <select id="weekSelect" class="week-select">
            <option value="">— Load available weeks —</option>
        </select>
        <button class="refresh-btn" onclick="loadComparison()">Load Comparison</button>
    </div>
    
    <div id="content" class="loading">Loading dashboard...</div>
</div>

<script>
    const API_BASE = 'https://backend-x5sw.onrender.com';
    let currentData = null;
    
    async function loadAvailableWeeks() {
        try {
            const res = await fetch(`${API_BASE}/api/rate-shop/available-weeks`);
            const weeks = await res.json();
            const select = document.getElementById('weekSelect');
            select.innerHTML = '<option value="">— Load available weeks —</option>';
            weeks.forEach(week => {
                const cleanWeek = String(week).split(':')[0].split('%')[0];
                const option = document.createElement('option');
                option.value = cleanWeek;
                option.textContent = new Date(cleanWeek).toLocaleDateString('en-ZA', { year: 'numeric', month: 'short', day: 'numeric' });
                select.appendChild(option);
            });
        } catch (err) {
            console.error('Failed to load weeks:', err);
        }
    }
    
    document.getElementById('weekSelect').addEventListener('change', function(e) {
        if (e.target.value) {
            document.getElementById('weekPicker').value = e.target.value;
            loadComparison();
        }
    });
    
    async function loadComparison() {
        let weekStart = document.getElementById('weekPicker').value;
        if (!weekStart) {
            const today = new Date();
            const day = today.getDay();
            const diff = day === 0 ? 6 : day - 1;
            const monday = new Date(today);
            monday.setDate(today.getDate() - diff);
            weekStart = monday.toISOString().split('T')[0];
            document.getElementById('weekPicker').value = weekStart;
        }
        
        const container = document.getElementById('content');
        container.innerHTML = '<div class="loading">⏳ Loading daily comparison...</div>';
        
        try {
            const res = await fetch(`${API_BASE}/api/rate-shop/daily-comparison?week_start_date=${weekStart}`);
            const data = await res.json();
            currentData = data;
            renderDashboard(data);
        } catch (err) {
            container.innerHTML = `<div class="error">❌ Failed to load: ${err.message}</div>`;
        }
    }
    
    function calculateKPIs(data) {
        const days = data.days;
        const properties = data.properties;
        
        let totalRates = 0;
        let rateCount = 0;
        let totalChanges = 0;
        let changeCount = 0;
        let priceUpCount = 0;
        let priceDownCount = 0;
        let soldOutCount = 0;
        
        for (const prop of properties) {
            for (const day of days) {
                const current = prop[`${day}_current`];
                const previous = prop[`${day}_previous`];
                const change = prop[`${day}_change`];
                const soldOut = prop[`${day}_sold_out`];
                
                if (current) {
                    totalRates += current;
                    rateCount++;
                }
                if (soldOut) soldOutCount++;
                if (change !== null && change !== undefined && change !== 0) {
                    totalChanges += Math.abs(change);
                    changeCount++;
                    if (change > 0) priceUpCount++;
                    if (change < 0) priceDownCount++;
                }
            }
        }
        
        const avgRate = rateCount > 0 ? totalRates / rateCount : 0;
        const avgMovement = changeCount > 0 ? totalChanges / changeCount : 0;
        const totalComparisons = properties.length * days.length;
        const totalDaysWithData = rateCount + soldOutCount;
        
        return {
            avgRate,
            avgMovement,
            priceUpCount,
            priceDownCount,
            totalComparisons,
            totalDaysWithData,
            soldOutCount,
            propertiesCount: properties.length
        };
    }
    
    function generateInsights(data, kpis) {
        const days = data.days;
        const properties = data.properties;
        const insights = [];
        
        // Calculate day-by-day price movement trends
        const dayMovements = {};
        for (const day of days) {
            let up = 0, down = 0, total = 0;
            for (const prop of properties) {
                const change = prop[`${day}_change`];
                if (change !== null && change !== undefined && change !== 0) {
                    total++;
                    if (change > 0) up++;
                    if (change < 0) down++;
                }
            }
            dayMovements[day] = { up, down, total };
        }
        
        // Find most volatile day
        let mostVolatileDay = '';
        let highestMovement = 0;
        for (const [day, stats] of Object.entries(dayMovements)) {
            if (stats.total > highestMovement) {
                highestMovement = stats.total;
                mostVolatileDay = day;
            }
        }
        
        // Find biggest mover property
        let biggestMover = '';
        let biggestChange = 0;
        for (const prop of properties) {
            let maxChange = 0;
            for (const day of days) {
                const change = prop[`${day}_change`];
                if (change && Math.abs(change) > maxChange) {
                    maxChange = Math.abs(change);
                }
            }
            if (maxChange > biggestChange) {
                biggestChange = maxChange;
                biggestMover = prop.property;
            }
        }
        
        // Market heat assessment
        let marketHeat = '';
        let marketHeatClass = '';
        if (kpis.priceUpCount > kpis.priceDownCount * 1.5) {
            marketHeat = '🔥 Market is heating up — more properties raising rates than cutting';
            marketHeatClass = 'heat-hot';
        } else if (kpis.priceDownCount > kpis.priceUpCount * 1.5) {
            marketHeat = '❄️ Market cooling — widespread rate cuts detected';
            marketHeatClass = 'heat-cool';
        } else {
            marketHeat = '📊 Market stable — balanced price movements';
            marketHeatClass = 'heat-stable';
        }
        
        // Build insights HTML
        insights.push(`<div class="insight-item"><div class="insight-dot"></div><div><strong>${marketHeat}</strong></div></div>`);
        insights.push(`<div class="insight-item"><div class="insight-dot"></div><div>📈 ${kpis.priceUpCount} price increases vs 📉 ${kpis.priceDownCount} decreases this week</div></div>`);
        insights.push(`<div class="insight-item"><div class="insight-dot"></div><div>💰 Average price movement: <strong>R ${Math.round(kpis.avgMovement).toLocaleString()}</strong> per change</div></div>`);
        
        if (mostVolatileDay) {
            insights.push(`<div class="insight-item"><div class="insight-dot"></div><div>📅 Most volatile day: <strong>${mostVolatileDay}</strong> (${highestMovement} properties changed rates)</div></div>`);
        }
        
        if (biggestMover && biggestChange > 0) {
            insights.push(`<div class="insight-item"><div class="insight-dot"></div><div>🏨 Biggest mover: <strong>${escapeHtml(biggestMover)}</strong> (R ${Math.round(biggestChange).toLocaleString()} change)</div></div>`);
        }
        
        if (kpis.soldOutCount > 0) {
            insights.push(`<div class="insight-item"><div class="insight-dot"></div><div>⚠️ ${kpis.soldOutCount} sold-out instances detected — high demand period</div></div>`);
        }
        
        return insights;
    }
    
    function renderDashboard(data) {
        const days = data.days;
        const properties = data.properties;
        const kpis = calculateKPIs(data);
        const insights = generateInsights(data, kpis);
        
        if (!properties || properties.length === 0) {
            document.getElementById('content').innerHTML = '<div class="error">No data found for this week. Upload daily rates first.</div>';
            return;
        }
        
        const marketHeatClass = kpis.priceUpCount > kpis.priceDownCount * 1.5 ? 'heat-hot' : (kpis.priceDownCount > kpis.priceUpCount * 1.5 ? 'heat-cool' : 'heat-stable');
        const marketHeatText = kpis.priceUpCount > kpis.priceDownCount * 1.5 ? 'Warming up' : (kpis.priceDownCount > kpis.priceUpCount * 1.5 ? 'Cooling down' : 'Stable');
        
        let html = `
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-label">Avg Daily Rate</div>
                    <div class="kpi-value">R ${Math.round(kpis.avgRate).toLocaleString()}</div>
                    <div class="kpi-change">Across all properties</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Properties Tracked</div>
                    <div class="kpi-value">${kpis.propertiesCount}</div>
                    <div class="kpi-change">Competitors monitored</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">High Demand Days</div>
                    <div class="kpi-value">${kpis.soldOutCount}</div>
                    <div class="kpi-change">Sold-out instances</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Market Heat</div>
                    <div class="kpi-value"><span class="heat-pill ${marketHeatClass}">${marketHeatText}</span></div>
                    <div class="kpi-change">${kpis.priceUpCount} ↑ / ${kpis.priceDownCount} ↓</div>
                </div>
            </div>
            
            <div class="insights-card">
                <div class="insights-title">🔍 Market Intelligence & Insights</div>
                ${insights.join('')}
            </div>
            
            <div class="section-title">📊 Daily Rate Movement — Day by Day Comparison</div>
            <div class="table-wrapper">
                <table class="daily-table">
                    <thead>
                        <tr class="day-group">
                            <th rowspan="2">Property</th>
                            ${days.map(day => `<th colspan="3">${day}</th>`).join('')}
                        </tr>
                        <tr>
                            ${days.map(() => `<th>This Week</th><th>Last Week</th><th>Change</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
        `;
        
        for (const prop of properties) {
            html += `<tr>`;
            html += `<td style="font-weight:700;text-align:left;">${escapeHtml(prop.property)}</td>`;
            
            for (const day of days) {
                const current = prop[`${day}_current`];
                const previous = prop[`${day}_previous`];
                const change = prop[`${day}_change`];
                const changePct = prop[`${day}_change_pct`];
                const soldOut = prop[`${day}_sold_out`];
                
                let currentHtml = '';
                if (soldOut) {
                    currentHtml = '<span class="sold-out">Sold out</span>';
                } else if (current !== null && current !== undefined) {
                    currentHtml = `R ${Math.round(current).toLocaleString()}`;
                } else {
                    currentHtml = '<span class="no-data">—</span>';
                }
                
                let previousHtml = '';
                if (previous !== null && previous !== undefined) {
                    previousHtml = `R ${Math.round(previous).toLocaleString()}`;
                } else {
                    previousHtml = '<span class="no-data">—</span>';
                }
                
                let changeHtml = '';
                if (change !== null && change !== undefined && change !== 0) {
                    const changeClass = change > 0 ? 'rate-up' : 'rate-down';
                    const sign = change > 0 ? '+' : '';
                    changeHtml = `<span class="${changeClass}">${sign}R ${Math.abs(Math.round(change))}<br><small>(${sign}${Math.abs(Math.round(changePct))}%)</small></span>`;
                } else if (change === 0) {
                    changeHtml = '<span class="no-data">0</span>';
                } else {
                    changeHtml = '<span class="no-data">—</span>';
                }
                
                html += `
                    <td style="vertical-align:middle;">${currentHtml}</td>
                    <td style="vertical-align:middle;">${previousHtml}</td>
                    <td style="vertical-align:middle;">${changeHtml}</td>
                `;
            }
            html += `</tr>`;
        }
        
        html += `
                    </tbody>
                </table>
            </div>
            <div class="sub-note">📌 Showing comparison between week starting ${data.week_start_date} and ${data.prev_week_start_date}</div>
        `;
        
        document.getElementById('content').innerHTML = html;
    }
    
    function escapeHtml(str) {
        return String(str || '').replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    // Initialize
    loadAvailableWeeks();
    loadComparison();
</script>
</body>
</html>
