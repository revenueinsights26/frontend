<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Waterfall B&B — Rate Intelligence Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #ffffff; color: #1e293b; padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { margin-bottom: 28px; }
        .header h1 { font-size: 28px; color: #0f172a; margin-bottom: 4px; }
        .header p { color: #475569; font-size: 14px; }
        .week-bar { background: #f8fafc; border-radius: 16px; padding: 16px 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; border: 1px solid #e2e8f0; }
        .week-bar label { font-weight: 600; font-size: 14px; color: #1e293b; }
        .week-picker { padding: 8px 14px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px; background: white; min-width: 220px; }
        .refresh-btn { background: #3b82f6; color: white; border: none; padding: 8px 20px; border-radius: 10px; font-weight: 500; cursor: pointer; }
        .refresh-btn:hover { background: #2563eb; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
        .kpi-card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .kpi-label { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #64748b; margin-bottom: 8px; }
        .kpi-value { font-size: 32px; font-weight: 800; color: #0f172a; line-height: 1; margin-bottom: 4px; }
        .kpi-sub { font-size: 12px; color: #64748b; }
        .trend-up { color: #10b981; }
        .trend-down { color: #ef4444; }
        .section-title { font-size: 18px; font-weight: 700; margin: 28px 0 16px 0; color: #0f172a; }
        .fast-movers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
        .mover-card { background: #f8fafc; border-radius: 16px; padding: 16px; border-left: 4px solid; }
        .mover-up { border-left-color: #10b981; }
        .mover-down { border-left-color: #ef4444; }
        .mover-name { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
        .mover-rate { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
        .mover-change { font-size: 13px; font-weight: 600; }
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-weight: 600; }
        tr:hover td { background: #f8fafc; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 30px; font-size: 12px; font-weight: 600; }
        .status-up { background: #dcfce7; color: #15803d; }
        .status-down { background: #fee2e2; color: #b91c1c; }
        .status-stable { background: #f1f5f9; color: #475569; }
        .trend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .trend-item { display: flex; justify-content: space-between; padding: 12px 16px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .insights-list { list-style: none; }
        .insights-list li { padding: 12px 0; border-bottom: 1px solid #e2e8f0; display: flex; gap: 12px; }
        .insights-list li:last-child { border-bottom: none; }
        .loading, .error { text-align: center; padding: 60px; background: white; border-radius: 20px; border: 1px solid #e2e8f0; }
        @media (max-width: 800px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏨 WATERFALL B&B MARKET INTELLIGENCE</h1>
        <p>Rate Shop Dashboard — competitor pricing, fast movers, and intelligence insights</p>
    </div>
    <div class="week-bar">
        <label>📅 Select Week:</label>
        <select id="weekSelect" class="week-picker"><option>Loading weeks...</option></select>
        <button class="refresh-btn" onclick="loadDashboard()">↻ Refresh</button>
    </div>
    <div id="dashboardContent"><div class="loading">Loading dashboard...</div></div>
</div>
<script>
    const API_BASE = 'https://backend-x5sw.onrender.com';
    let allWeeks = [];

    async function loadAvailableWeeks() {
        try {
            const res = await fetch(`${API_BASE}/api/rate-shop/available-weeks`);
            if (!res.ok) throw new Error();
            const weeks = await res.json();
            allWeeks = weeks;
            const select = document.getElementById('weekSelect');
            select.innerHTML = '';
            if (weeks.length === 0) {
                select.innerHTML = '<option>No data yet — upload rates first</option>';
                document.getElementById('dashboardContent').innerHTML = '<div class="error">📭 No data yet. Use the upload page to add weekly rates.</div>';
                return;
            }
            weeks.forEach(week => {
                const option = document.createElement('option');
                option.value = week;
                option.textContent = new Date(week).toLocaleDateString('en-ZA', { year: 'numeric', month: 'short', day: 'numeric' });
                select.appendChild(option);
            });
            if (weeks.length > 0) loadDashboard(weeks[0]);
        } catch (err) {
            document.getElementById('weekSelect').innerHTML = '<option>Error loading</option>';
            document.getElementById('dashboardContent').innerHTML = '<div class="error">❌ Cannot reach backend. Make sure your backend is running.</div>';
        }
    }

    async function loadDashboard(selectedWeek = null) {
        const container = document.getElementById('dashboardContent');
        container.innerHTML = '<div class="loading">Loading...</div>';
        let weekToUse = selectedWeek || (allWeeks.length ? allWeeks[0] : null);
        if (!weekToUse && document.getElementById('weekSelect').value) weekToUse = document.getElementById('weekSelect').value;
        if (!weekToUse) return;
        try {
            const res = await fetch(`${API_BASE}/api/rate-shop/dashboard-data?week_start_date=${weekToUse}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (!data.current_week) { container.innerHTML = '<div class="error">No data for this week</div>'; return; }
            renderDashboard(data);
        } catch (err) {
            container.innerHTML = '<div class="error">❌ Failed to load data</div>';
        }
    }

    function formatCurrency(amt) { return `R ${Math.round(amt).toLocaleString()}`; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

    function renderDashboard(data) {
        const c = data.current_week;
        const changeClass = c.avg_rate_change_pct >= 0 ? 'trend-up' : 'trend-down';
        const changeSign = `${c.avg_rate_change_pct >= 0 ? '↑' : '↓'} ${Math.abs(c.avg_rate_change_pct).toFixed(1)}%`;
        document.getElementById('dashboardContent').innerHTML = `
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-label">AVG RATE</div><div class="kpi-value">${formatCurrency(c.avg_rate)}</div><div class="kpi-sub ${changeClass}">${changeSign} vs last week</div></div>
                <div class="kpi-card"><div class="kpi-label">MEDIAN RATE</div><div class="kpi-value">${formatCurrency(c.median_rate)}</div><div class="kpi-sub">Mid-market benchmark</div></div>
                <div class="kpi-card"><div class="kpi-label">HIGH DEMAND</div><div class="kpi-value">${c.high_demand_count} / ${c.total_properties}</div><div class="kpi-sub">Properties with high occupancy</div></div>
                <div class="kpi-card"><div class="kpi-label">MARKET HEAT</div><div class="kpi-value">${c.market_heat || 'Stable'}</div><div class="kpi-sub">${c.avg_rate_change_pct > 3 ? 'Accelerating' : 'Normal'}</div></div>
            </div>
            <div class="section-title">🚀 FAST MOVERS THIS WEEK</div>
            <div class="fast-movers-grid">${c.fast_movers.map(m => `<div class="mover-card ${m.change >= 0 ? 'mover-up' : 'mover-down'}"><div class="mover-name">${escapeHtml(m.name)}</div><div class="mover-rate">${formatCurrency(m.rate)}</div><div class="mover-change">${m.change >= 0 ? '+' : ''}${formatCurrency(Math.abs(m.change))} (${m.change_pct >= 0 ? '+' : ''}${m.change_pct.toFixed(1)}%)</div></div>`).join('')}</div>
            <div class="section-title">📈 MARKET TRENDS</div>
            <div class="trend-grid">${c.four_week_trends.map(t => `<div class="trend-item"><strong>${escapeHtml(t.name)}</strong><span>${formatCurrency(t.rate)}</span></div>`).join('')}</div>
            <div class="section-title">📋 WEEKLY RATE MOVEMENT</div>
            <div class="table-wrapper"><table><thead><tr><th>Property</th><th>Last Week</th><th>This Week</th><th>Change</th><th>Change %</th><th>Occupancy</th><th>Status</th></tr></thead><tbody>${c.main_table.map(row => `<tr><td><strong>${escapeHtml(row.property)}</strong></td><td>${row.last_week ? formatCurrency(row.last_week) : '-'}</td><td>${formatCurrency(row.this_week)}</td class="${row.change_rand >= 0 ? 'trend-up' : 'trend-down'}">${row.change_rand >= 0 ? '+' : ''}${formatCurrency(Math.abs(row.change_rand))}</td class="${row.change_pct >= 0 ? 'trend-up' : 'trend-down'}">${row.change_pct >= 0 ? '+' : ''}${row.change_pct.toFixed(1)}%</td><td>${row.sold_out}%</td><td><span class="status-badge ${row.status === 'Up fast' ? 'status-up' : (row.status === 'Down fast' ? 'status-down' : 'status-stable')}">${row.status}</span></td></tr>`).join('')}</tbody></table></div>
            <div class="section-title">🔍 INTELLIGENCE INSIGHTS</div>
            <div class="card"><ul class="insights-list">${c.insights.map(i => `<li><span>❗️</span> ${escapeHtml(i)}</li>`).join('')}${c.insights.length === 0 ? '<li>💡 Add more weekly data to see automatic insights</li>' : ''}</ul></div>
        `;
    }

    document.getElementById('weekSelect').addEventListener('change', e => loadDashboard(e.target.value));
    loadAvailableWeeks();
</script>
</body>
</html>
