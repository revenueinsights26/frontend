<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Rate Intelligence - Revenue Insights</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="page">
  
  <!-- HEADER -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <div>
      <h1 style="margin: 0;">📊 Rate Intelligence</h1>
      <p class="subtle">AI-powered pricing recommendations based on historical data and demand patterns</p>
    </div>
    <button onclick="window.location.href='dashboard.html'" style="background: #6b7280;">← Back to Dashboard</button>
  </div>

  <!-- Month Selector -->
  <div class="month-nav" style="margin-bottom: 24px;">
    <button id="prevMonth">‹</button>
    <span id="monthLabel">—</span>
    <button id="nextMonth">›</button>
  </div>

  <!-- EXECUTIVE SUMMARY CARD -->
  <div id="summaryCard" class="card" style="margin-bottom: 24px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white;">
    <!-- Dynamic content -->
  </div>

  <!-- TWO COLUMN LAYOUT -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">
    
    <!-- RATE RECOMMENDATIONS -->
    <div class="card">
      <h3>💰 Rate Recommendations</h3>
      <div id="rateRecommendations">
        <!-- Dynamic content -->
      </div>
    </div>

    <!-- REVENUE TRIANGLE ANALYSIS -->
    <div class="card">
      <h3>🔺 Revenue Triangle Analysis</h3>
      <div id="revenueTriangle">
        <!-- Dynamic content -->
      </div>
    </div>

  </div>

  <!-- DEMAND CALENDAR -->
  <div class="card" style="margin-bottom: 24px;">
    <h3>📅 Demand Calendar (Next 30 Days)</h3>
    <div id="demandCalendar">
      <!-- Dynamic content -->
    </div>
  </div>

  <!-- DAY-SPECIFIC RECOMMENDATIONS TABLE -->
  <div class="card">
    <h3>🎯 Day-by-Day Rate Strategy</h3>
    <div class="table-wrapper">
      <table class="detailed-table" id="strategyTable">
        <!-- Dynamic content -->
      </table>
    </div>
  </div>

</div>

<script src="rate-intelligence.js"></script>
</body>
</html>
